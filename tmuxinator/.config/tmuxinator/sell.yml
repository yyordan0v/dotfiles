name: sell
root: ~/code/sell
startup_window: terminal
on_project_start: sudo systemctl stop mariadb
on_project_stop: sudo systemctl start mariadb
windows:
  - server:
      layout: tiled
      panes:
        - sail:
            - ./vendor/bin/sail up -d
        - vite:
            # - sleep 10 && ./vendor/bin/sail npm run dev
            - sleep 10 && ./vendor/bin/sail npm run build && cloudflared tunnel run sell-dev
  - workers:
      layout: even-horizontal
      panes:
        - queues:
            - sleep 10 && ./vendor/bin/sail artisan queue:work
        - scheduler:
            - sleep 10 && ./vendor/bin/sail artisan schedule:work
  - terminal:
      layout: even-horizontal
      panes:
        - git:
            - git status
        - database:
            - sleep 10 && ./vendor/bin/sail artisan tinker
  - webhooks:
      layout: even-horizontal
      panes:
        - stripe:
            - stripe listen --api-key sk_test --forward-to localhost/stripe/webhook-connect
        - ngrok:
            - ngrok http 80
